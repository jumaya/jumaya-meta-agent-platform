apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: architect
  template:
    metadata:
      labels:
        app: architect
    spec:
      containers:
        - name: architect
          image: meta-agent-architect:latest
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: meta-agent-config
            - secretRef:
                name: meta-agent-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
