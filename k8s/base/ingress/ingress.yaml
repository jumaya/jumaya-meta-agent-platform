apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meta-agent-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: meta-agent.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: orchestrator-svc
                port:
                  number: 8000
