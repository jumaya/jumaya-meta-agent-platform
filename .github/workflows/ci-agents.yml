name: CI Agents

on:
  push:
    branches: [main, develop]
    paths:
      - 'agents/**'
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'

jobs:
  lint-and-test:
    name: Lint & Test Python Agents
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install shared package
        run: |
          pip install uv
          cd agents
          uv pip install --system -e shared/[dev]

      - name: Lint with ruff
        run: |
          cd agents
          ruff check .

      - name: Check formatting with ruff
        run: |
          cd agents
          ruff format --check .

      - name: Run tests
        run: |
          cd agents
          python -m pytest --tb=short -q
        env:
          MONGODB_URI: ""
          GOOGLE_API_KEY: ""
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
          BING_SEARCH_KEY: ""

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    permissions:
      contents: read

    strategy:
      matrix:
        agent: [orchestrator, architect, coder, tester, devops, security]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.agent }} image
        uses: docker/build-push-action@v6
        with:
          context: agents/${{ matrix.agent }}
          push: false
          tags: meta-agent-${{ matrix.agent }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
