name: CI Services

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'

jobs:
  build-and-test:
    name: Build & Test .NET Services
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore services/MetaAgent.sln

      - name: Build
        run: dotnet build services/MetaAgent.sln --no-restore -c Release

      - name: Check formatting
        run: dotnet format services/MetaAgent.sln --verify-no-changes

  build-images:
    name: Build .NET Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test

    strategy:
      matrix:
        service:
          - name: scaffolder
            context: services/MetaAgent.Scaffolder
          - name: cloud-analyzer
            context: services/MetaAgent.CloudAnalyzer

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: meta-agent-${{ matrix.service.name }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
